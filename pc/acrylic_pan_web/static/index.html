<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Acrylic Pan AI Demo</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body><main>
  <header>
    <div><h1>Acrylic Pan AI Demo</h1><p>振動計測・FFT表示・8クラス推論の実機比較</p></div>
    <span id="connection" class="badge">未接続</span>
  </header>
  <section class="controls card">
    <label>COMポート <select id="port"></select></label>
    <button id="refresh">更新</button><button id="connect" class="primary">接続</button>
    <button id="disconnect">切断</button><button id="ping">ボード確認</button>
    <button id="capture" class="primary">測定トリガー</button><button id="demo">デモ波形</button>
    <a class="mode-link" href="/collector.html">振動採取版を開く</a>
  </section>
  <section class="session card">
    <label>保存先 <input id="output" size="60"></label>
    <label>クラスID（任意） <input id="classId" type="number" min="0"></label>
    <button id="newSession">新規セッション</button><div id="sessionPath"></div>
  </section>
  <section id="stats" class="stats"></section>
  <div id="controlStatus">接続後、「測定トリガー」または「AI推論を開始」を押してください。</div>
  <div id="error" class="error"></div>
  <section class="card ai-panel">
    <div class="ai-toolbar"><h2>AIダミーモデル一致試験</h2>
      <label>テスト番号 <input id="aiCase" type="number" min="0" max="7" value="0"></label>
      <button id="aiSelftest" class="primary">AI推論を開始</button>
      <button id="aiRunAll">8ケース連続実行</button>
    </div>
    <div id="aiSummary" class="ai-summary">実機推論結果を待っています。</div>
    <div id="aiOutputs" class="ai-outputs"></div>
  </section>
  <section class="card plot"><h2>振動波形</h2><canvas id="wave" width="1100" height="280"></canvas></section>
  <section class="card plot"><h2>FFTスペクトル（DC除去・Hann窓）</h2><canvas id="fft" width="1100" height="280"></canvas></section>
  <footer id="eventInfo">イベントを待っています。</footer>
</main><script src="/app.js"></script></body>
</html>
